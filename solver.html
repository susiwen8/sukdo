<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sukdo Solver</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-glow page-glow-left"></div>
    <div class="page-glow page-glow-right"></div>

    <main class="app-shell solver-shell">
      <section class="game-layout solver-layout">
        <section class="board-panel">
          <div class="panel-topline">
            <div>
              <strong>数独盘面</strong>
            </div>
            <div class="status-pill"><span id="solver-step-count">0</span> 步</div>
          </div>

          <div class="board-frame">
            <div id="solver-board" class="board" aria-label="Sudoku solver input board"></div>
          </div>

          <div class="keypad-card solver-actions">
            <button id="solver-solve" class="action-button primary">自动求解</button>
            <button id="solver-clear" class="action-button">清空全部</button>
            <button id="solver-sample" class="action-button">载入示例</button>
          </div>
          <p id="solver-message" class="message">输入一个题目后，就可以直接求解。</p>
        </section>

        <aside class="side-panel">
          <section class="panel-card panel-card-accent solver-steps-panel">
            <div class="panel-topline">
              <strong>求解步骤</strong>
            </div>
            <div class="solver-guide-controls">
              <button id="solver-guide-prev" class="action-button" disabled>上一步</button>
              <button id="solver-guide-next" class="action-button" disabled>下一步</button>
            </div>
            <ol id="solver-steps" class="solver-steps"></ol>
          </section>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/solver-main.js"></script>
  </body>
</html>
